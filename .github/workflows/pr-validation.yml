name: PR Validation

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  TML_VERSION: v2026.05.3.0
  MOD_NAME: OmoriMod
  MOD_DIR: ${{ github.workspace }}/tModLoader/ModSources/OmoriMod
  TML_DIR: ${{ github.workspace }}/tModLoader
  TML_SAVE_DIR: ${{ github.workspace }}/tml-save

jobs:
  validate:
    name: Lint, build, and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          path: tModLoader/ModSources/OmoriMod

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Check import ordering
        working-directory: ${{ env.MOD_DIR }}
        shell: pwsh
        run: |
          ./sort_imports.ps1

          git diff --exit-code
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Import ordering is out of date. Run ./sort_imports.ps1 locally and commit the result."
            exit 1
          }

      - name: Download pinned tModLoader
        working-directory: ${{ github.workspace }}
        shell: bash
        run: |
          set -euo pipefail

          curl --fail --location --retry 3 \
            --output tModLoader.zip \
            "https://github.com/tModLoader/tModLoader/releases/download/${TML_VERSION}/tModLoader.zip"
          unzip -q tModLoader.zip -d "${TML_DIR}"

          chmod +x "${TML_DIR}"/*.sh || true

          cat > "${TML_DIR}/ModSources/tModLoader.targets" <<'EOF'
          <Project ToolsVersion="14.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
            <Import Project="$(MSBuildThisFileDirectory)../tMLMod.targets" />
          </Project>
          EOF

          sdk_version="$(dotnet --list-sdks | awk '/^8\.0\./ { print $1 }' | sort -V | tail -n 1)"
          if [[ -z "${sdk_version}" ]]; then
            echo "A .NET 8 SDK was not installed." >&2
            exit 1
          fi

          dotnet new globaljson \
            --sdk-version "${sdk_version}" \
            --roll-forward latestPatch \
            --force \
            --output "${TML_DIR}"

          ln -sf \
            "${TML_DIR}/Libraries/Native/Linux/libSDL2-2.0.so.0" \
            "${TML_DIR}/Libraries/Native/Linux/libSDL2.so"

      - name: Lint C# analyzers
        working-directory: ${{ env.MOD_DIR }}
        shell: bash
        run: |
          set -euo pipefail
          dotnet format analyzers OmoriMod.csproj \
            --verify-no-changes \
            --severity warn \
            --verbosity minimal

      - name: Build mod
        working-directory: ${{ env.MOD_DIR }}
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ env.TML_DIR }}/Libraries/Native/Linux
        run: |
          set -euo pipefail
          mkdir -p "${TML_SAVE_DIR}"
          dotnet build OmoriMod.csproj \
            --configuration Release \
            -p:ExtraBuildModFlags="-tmlsavedirectory ${TML_SAVE_DIR}"

      - name: Prepare smoke-test save
        id: smoke_save
        working-directory: ${{ env.MOD_DIR }}
        shell: bash
        run: |
          set -euo pipefail

          mods_dir="${TML_SAVE_DIR}/Mods"
          tmod_file="${mods_dir}/${MOD_NAME}.tmod"
          if [[ ! -f "${tmod_file}" ]]; then
            echo "Could not find built mod at ${tmod_file}" >&2
            exit 1
          fi

          worlds_dir="${TML_SAVE_DIR}/Worlds"
          mkdir -p "${mods_dir}" "${worlds_dir}"

          printf '["%s"]\n' "${MOD_NAME}" > "${mods_dir}/enabled.json"

          server_config="${RUNNER_TEMP}/tml-serverconfig.txt"
          cat > "${server_config}" <<EOF
          world=${worlds_dir}/SmokeTest.wld
          autocreate=1
          worldname=SmokeTest
          difficulty=0
          maxplayers=1
          port=7777
          password=
          motd=GitHub Actions smoke test
          secure=0
          language=en-US
          EOF

          {
            echo "tmod_file=${tmod_file}"
            echo "mods_dir=${mods_dir}"
            echo "server_config=${server_config}"
          } >> "${GITHUB_OUTPUT}"

      - name: Run headless tModLoader server smoke test
        working-directory: ${{ env.TML_DIR }}
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ env.TML_DIR }}/Libraries/Native/Linux
        run: |
          set -euo pipefail

          server_output="${RUNNER_TEMP}/tml-server-output.log"
          set +e
          timeout 120s dotnet tModLoader.dll \
            -server \
            -tmlsavedirectory "${TML_SAVE_DIR}" \
            -modpath "${{ steps.smoke_save.outputs.mods_dir }}" \
            -config "${{ steps.smoke_save.outputs.server_config }}" \
            > "${server_output}" 2>&1
          status=$?
          set -e

          cat "${server_output}"

          if [[ "${status}" -ne 0 && "${status}" -ne 124 ]]; then
            echo "tModLoader server exited with status ${status}." >&2
            exit "${status}"
          fi

          log_dir="${TML_SAVE_DIR}/Logs"
          combined_logs="${RUNNER_TEMP}/tml-combined-logs.txt"
          {
            cat "${server_output}"
            if [[ -d "${log_dir}" ]]; then
              find "${log_dir}" -type f -name '*.log' -print0 | sort -z | xargs -0 -r cat
            fi
          } > "${combined_logs}"

          mod_display_name="$(sed -nE 's/^[[:space:]]*displayName[[:space:]]*=[[:space:]]*(.+)[[:space:]]*$/\1/p' "${MOD_DIR}/build.txt" | head -n 1)"
          if [[ -z "${mod_display_name}" ]]; then
            echo "Could not read displayName from build.txt." >&2
            exit 1
          fi

          if ! grep -Fqi "Sandboxing: ${mod_display_name}" "${combined_logs}"; then
            echo "The smoke test did not find evidence that ${mod_display_name} was loaded." >&2
            exit 1
          fi

          if ! grep -Eiq "Listening on port|Server started" "${combined_logs}"; then
            echo "The tModLoader server did not reach its ready state." >&2
            exit 1
          fi

          if grep -Eiq "(fatal|exception|error loading|load failed|failed to load|missing asset|could not load|cannot load|stack trace)" "${combined_logs}"; then
            echo "The smoke test found an obvious tModLoader runtime/load error." >&2
            exit 1
          fi

      - name: Upload tModLoader logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tmodloader-smoke-test-logs
          path: |
            ${{ runner.temp }}/tml-server-output.log
            ${{ runner.temp }}/tml-combined-logs.txt
            ${{ env.TML_SAVE_DIR }}/Logs/**
          if-no-files-found: ignore
